[build]
  command = "npm run build"
  publish = "dist"
  # Build runs on GitHub Actions, then `netlify deploy` uploads here — skip duplicate builds on Netlify servers (saves Netlify build minutes).
  ignore = "exit 0"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  functions = "netlify/functions"

