# Build on GitHub (Actions minutes), then upload dist + Netlify Functions to Netlify.
# Netlify’s Git-triggered build is skipped in netlify.toml so pushes do not consume Netlify build minutes.
name: Deploy to Netlify

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_BUSINESS_QUOTE_EMAIL: ${{ secrets.VITE_BUSINESS_QUOTE_EMAIL }}

      - name: Deploy to Netlify
        run: npx --yes netlify-cli deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
